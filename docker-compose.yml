version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: paystream_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: paystream_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: paystream_redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: paystream_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
version: '3.8'

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15
    container_name: paystream_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: paystream_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Application Services ---
  
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: paystream_gateway
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    env_file: .env
    depends_on:
      auth-service:
        condition: service_started

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: paystream_auth
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  wallet-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: wallet-service
    container_name: paystream_wallet
    ports:
      - "${WALLET_PORT}:${WALLET_PORT}"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ledger-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: ledger-service
    container_name: paystream_ledger
    ports:
      - "${LEDGER_PORT}:${LEDGER_PORT}"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
    container_name: paystream_notifications
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy

networks:
  default:
    name: paystream_network